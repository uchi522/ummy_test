name: 機能追加（仕様）
description: AIに実装させるための新機能の仕様を定義します
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: overview
    attributes:
      label: 概要
      description: 追加する機能の目的と概要を記述してください
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: 要件・仕様
      description: 入力データ、期待される出力、画面の挙動などを具体的に記述してください
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 制約事項
      description: 使用するライブラリの制限や、パフォーマンス要件などがあれば記述してください
  - type: textarea
    id: tests
    attributes:
      label: 受け入れ条件
      description: どのようなテストを通れば実装完了とするかを箇条書きで記述してください
    validations:
      required: true